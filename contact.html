<section class="contact-section">
    <h1 class="section-title">CONTACT ME</h1>

    <div class="contact-container text-card">
        <div class="contact-info">
            <h3>Get In Touch</h3>
            <p>I'm currently available for new virtual assistant projects. Let's talk about how I can help your business!</p>
            
            <div class="info-item">
                <i class="fas fa-envelope"></i>
                <span>cathy.delacruz@email.com</span>
            </div>
            <div class="info-item">
                <i class="fas fa-phone"></i>
                <span>+63 9XX XXX XXXX</span>
            </div>
            <div class="info-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>Bacoor, Philippines</span>
            </div>

            <div class="social-icons">
                <a href="#"><div class="icon-circle"><i class="fab fa-linkedin-in"></i></div></a>
                <a href="#"><div class="icon-circle"><i class="fab fa-github"></i></div></a>
                <a href="#"><div class="icon-circle"><i class="fab fa-twitter"></i></div></a>
            </div>
        </div>

        <div class="contact-form">
            <form action="#">
                <div class="form-group">
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea placeholder="Your Message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
        </div>
    </div>
</section>
